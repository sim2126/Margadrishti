# Margadrishti production runtime — one command (`docker compose up --build`) to the full stack:
# PostGIS (serving) · Redis (broker) · API · Celery worker · Celery beat · Martin tiles.
#
# Hardening notes:
#  - postgis/redis are NOT published to the host (internal network only) to avoid port
#    conflicts and host exposure. Add a `dev` profile + ports if you need host access.
#  - Image tags are pinned. For true immutability pin @sha256 digests + add a lockfile;
#    digests are environment-specific so they are intentionally left as a deploy step.
#  - Writer services (bootstrap/worker/scheduler) mount raw data + the full data dir.
#    The API mounts ONLY gold/ read-only — never raw CSVs or _restricted PII.

x-backend: &backend
  build: ./backend
  environment: &backend-env
    MARGA_OFFLINE: "false"
    POSTGIS_DSN: "postgresql://margadrishti:${POSTGIS_PASSWORD:?POSTGIS_PASSWORD is required}@postgis:5432/margadrishti"
    REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0"
    MARGA_DATA_ROOT: "/app/data"
    RAW_VIOLATIONS_CSV: "/data/jan to may police violation_anonymized791b166.csv"
    # Bounded first-run extent (Koramangala). Non-colon default applies only when UNSET;
    # to run the full city export MARGA_ETL_BBOX="" (empty but set).
    MARGA_ETL_BBOX: "${MARGA_ETL_BBOX-77.60,12.91,77.65,12.95}"
    ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    CLAUDE_MODEL_REASONING: "${CLAUDE_MODEL_REASONING:-claude-opus-4-8}"
    CLAUDE_MODEL_FAST: "${CLAUDE_MODEL_FAST:-claude-sonnet-4-6}"
    CLAUDE_MODEL_PRICES_MTOK: "${CLAUDE_MODEL_PRICES_MTOK:-claude-haiku-4-5:1,5;claude-sonnet-4-6:3,15;claude-opus-4-8:15,75}"
    MARGA_PII_SALT: "${MARGA_PII_SALT:?MARGA_PII_SALT is required}"
    MARGA_CORS_ORIGINS: "${MARGA_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}"
  depends_on:
    postgis: {condition: service_healthy}
    redis: {condition: service_healthy}

# Writer services see raw data + the full (writable) data dir.
x-writer-volumes: &writer-volumes
  - ./backend/data:/app/data
  - ./:/data:ro

services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: margadrishti
      POSTGRES_PASSWORD: "${POSTGIS_PASSWORD:?POSTGIS_PASSWORD is required}"
      POSTGRES_DB: margadrishti
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U margadrishti"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?REDIS_PASSWORD is required} ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: ETL → train → publish to PostGIS, then exit. Populates serving tables.
  bootstrap:
    <<: *backend
    command: python -m margadrishti.worker all
    restart: "no"
    volumes: *writer-volumes

  api:
    <<: *backend
    # Reads as the non-owner role so zone-scoped RLS binds. Mounts ONLY gold/ (read-only):
    # never the raw CSVs or _restricted PII.
    environment:
      <<: *backend-env
      POSTGIS_READ_DSN: "postgresql://margadrishti_api:${MARGA_API_PASSWORD:?MARGA_API_PASSWORD is required}@postgis:5432/margadrishti"
    command: uvicorn margadrishti.api.app:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - ./backend/data/gold:/app/data/gold:ro
    ports: ["8000:8000"]
    depends_on:
      postgis: {condition: service_healthy}
      redis: {condition: service_healthy}
      bootstrap: {condition: service_completed_successfully}

  worker:
    <<: *backend
    command: celery -A margadrishti.core.celery_app worker --loglevel=info -Q margadrishti --concurrency=1
    volumes: *writer-volumes

  scheduler:
    <<: *backend
    command: celery -A margadrishti.core.celery_app beat --loglevel=info
    volumes: *writer-volumes

  tiles:
    image: ghcr.io/maplibre/martin:v0.13.0
    command: ["--config", "/config/martin.yaml"]
    environment:
      POSTGIS_DSN: "postgresql://margadrishti:${POSTGIS_PASSWORD:?POSTGIS_PASSWORD is required}@postgis:5432/margadrishti"
    volumes:
      - ./backend/infra/martin.yaml:/config/martin.yaml:ro
    depends_on:
      postgis: {condition: service_healthy}
      bootstrap: {condition: service_completed_successfully}
    ports: ["3000:3000"]

volumes:
  pgdata:
name: margadrishti
